name = "constraint-theory"
type = "webpack"
main = "workers/src/index.ts"
compatibility_date = "2024-01-01"
node_compat = true

[env.production]
routes = [
  { pattern = "https://constrainttheory.com/*", zone_name = "constrainttheory.com" }
]

[env.production.vars]
ENVIRONMENT = "production"
API_VERSION = "v1"
CORS_ORIGIN = "https://constrainttheory.com"

[env.staging.vars]
ENVIRONMENT = "staging"
API_VERSION = "v1"
CORS_ORIGIN = "https://staging.constrainttheory.com"

[env.development.vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
CORS_ORIGIN = "*"

[[env.production.kv_namespaces]]
binding = "SESSION_STORE"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[build]
command = "cd workers && npm install && npm run build"

[build.upload]
format = "modules"
main = "./workers/dist/index.js"

# Docker support for heavy compute
[env.production]
docker_image = "constraint-theory-worker:latest"

[dev]
port = 8787
local_protocol = "http"

[site]
bucket = "./web"
entry-point = "workers"
