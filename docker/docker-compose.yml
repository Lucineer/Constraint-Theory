version: '3.8'

services:
  constraint-theory-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: constraint-theory-worker
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - ENVIRONMENT=production
      - API_VERSION=v1
      - CORS_ORIGIN=*
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - constraint-network

  redis:
    image: redis:7-alpine
    container_name: constraint-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - constraint-network

  nginx:
    image: nginx:alpine
    container_name: constraint-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../web:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - constraint-theory-worker
    restart: unless-stopped
    networks:
      - constraint-network

volumes:
  redis-data:

networks:
  constraint-network:
    driver: bridge
