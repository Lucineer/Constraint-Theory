[package]
name = "constraint-theory-wasm"
version = "0.1.0"
edition = "2021"
authors = ["SuperInstance"]
description = "Constraint theory engine compiled to WebAssembly"
license = "MIT"
repository = "https://github.com/SuperInstance/constrainttheory"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1"
wee_alloc = "0.4"

[dependencies.web-sys]
version = "0.3"
features = [
  "console",
  "Window",
  "Document",
  "Element",
  "HtmlElement",
  "CanvasRenderingContext2d",
]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-mutable-globals"]
